# ============================================================
# docker-compose.yml — CHROMATOX·EDU desarrollo local
# ============================================================

version: "3.9"

services:

  # ── PostgreSQL ──────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB:       chromatox
      POSTGRES_USER:     chromatox
      POSTGRES_PASSWORD: chromatox_dev
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./backend/models/schema.sql:/docker-entrypoint-initdb.d/01_schema.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U chromatox"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ── Redis ───────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s

  # ── ChromaDB ────────────────────────────────────────────────
  chromadb:
    image: chromadb/chroma:latest
    restart: unless-stopped
    volumes:
      - chroma_data:/chroma/chroma
    ports:
      - "8001:8000"
    environment:
      ANONYMIZED_TELEMETRY: "false"

  # ── Backend FastAPI ─────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL:      postgresql+asyncpg://chromatox:chromatox_dev@db/chromatox
      REDIS_URL:         redis://redis:6379
      CHROMA_URL:        http://chromadb:8000
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      PDF_DIR:           /app/data/pdfs
      ENVIRONMENT:       development
    volumes:
      - ./backend:/app
      - pdf_data:/app/data/pdfs
    depends_on:
      db:       { condition: service_healthy }
      redis:    { condition: service_healthy }
      chromadb: { condition: service_started }
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload

  # ── Frontend Vite ───────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "5173:5173"
    environment:
      VITE_API_URL: http://localhost:8000
      VITE_WS_URL:  ws://localhost:8000
    volumes:
      - ./frontend:/app
      - /app/node_modules
    command: npm run dev -- --host

  # ── Celery worker (tareas asíncronas) ───────────────────────
  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      DATABASE_URL:      postgresql+asyncpg://chromatox:chromatox_dev@db/chromatox
      REDIS_URL:         redis://redis:6379
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
    volumes:
      - ./backend:/app
    depends_on:
      - db
      - redis
    command: celery -A tasks worker --loglevel=info --concurrency=4

volumes:
  pg_data:
  chroma_data:
  pdf_data:
